<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        h2 {
            text-align: center;
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 400;
        }
        
        .form-section {
            position: relative;
        }
        
        form {
            transition: all 0.3s ease;
        }
        
        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .register-btn {
            background: #667eea;
            color: white;
        }
        
        .register-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .login-btn {
            background: #4CAF50;
            color: white;
        }
        
        .login-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .back-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        .back-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .error {
            color: #f44336;
            margin: 15px 0;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            background: #ffebee;
            font-size: 14px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #registerForm {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chat Room</h1>
        <h2>Connect and chat with friends</h2>
        
        <!-- 登录和注册表单 -->
        <div class="form-section">
            <form action="/login" method="post">
                <input type="text" name="username" placeholder="请输入用户名" required>
                <input type="password" name="password" placeholder="请输入密码(6位以上)" required>
                <div class="button-group">
                    <button type="button" onclick="switchToRegister()" class="register-btn">注册</button>
                    <button type="submit" class="login-btn">登录</button>
                </div>
            </form>
            <form id="registerForm" action="/register" method="post" style="display: none; margin-top: 30px;">
                <input type="text" name="username" placeholder="请输入用户名" required>
                <input type="password" name="password" placeholder="请输入密码(6位以上)" required>
                <div class="button-group">
                    <button type="button" onclick="switchToLogin()" class="back-btn">返回登录</button>
                    <button type="submit" class="login-btn">注册并登录</button>
                </div>
            </form>
        </div>
        
        <script>
            function switchToRegister() {
                document.querySelector('form[action="/login"]').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            
            function switchToLogin() {
                document.getElementById('registerForm').style.display = 'none';
                document.querySelector('form[action="/login"]').style.display = 'block';
            }
        </script>
    </div>
</body>
</html>
