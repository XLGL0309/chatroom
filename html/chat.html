<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat Room</title>
    <style>
        * {box-sizing: border-box;}
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #333; }
        .user-info { text-align: right; margin-bottom: 20px; font-weight: bold; color: #4CAF50; }
        .message-section, .send-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9; }
        h2 { color: #333; margin-top: 0; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; resize: vertical; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2); }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background-color 0.3s; }
        button:hover { background: #45a049; }
        button:active { background: #3d8b40; }
        #messages { margin-top: 10px; padding: 15px; border: 1px solid #eee; min-height: 200px; box-sizing: border-box; background-color: white; border-radius: 4px; }
        .error { color: red; margin: 10px 0; padding: 10px; background-color: #ffebee; border-left: 4px solid #f44336; border-radius: 4px; }
        .success { color: green; margin: 10px 0; padding: 10px; background-color: #e8f5e8; border-left: 4px solid #4CAF50; border-radius: 4px; }
        .message-item { margin-bottom: 10px; padding: 8px; border-bottom: 1px solid #eee; }
        .message-sender { font-weight: bold; color: #4CAF50; }
        .message-content { margin-left: 10px; }
        .status-info { font-size: 12px; color: #999; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chat Room</h1>
        <div class="user-info">欢迎, %USERNAME%</div>
        
        <div class="send-section">
            <h2>发送消息</h2>
            <form action="/send" method="post">
                <input type="hidden" name="from" value="%USERNAME%">
                <input type="text" name="to" placeholder="请输入接收者用户名" required>
                <textarea name="content" placeholder="请输入消息内容" rows="3" required></textarea>
                <button type="submit">发送</button>
                %STATUS%
            </form>
        </div>
        
        <div class="message-section">
            <h2>消息</h2>
            <div class="status-info">消息将自动更新</div>
            <div id="messages">%MESSAGES%</div>
        </div>
    </div>

    <script>
        // 获取当前用户名
        const username = "%USERNAME%";
        // 当前消息数量
        let currentMessageCount = 0;
        
        // 长轮询函数
        function longPollMessages() {
            // 兼容所有浏览器的XMLHttpRequest创建
            let xhr;
            if (window.XMLHttpRequest) {
                // 现代浏览器
                xhr = new XMLHttpRequest();
            } else {
                // 旧版IE
                xhr = new ActiveXObject("Microsoft.XMLHTTP");
            }
            
            // 发送GET请求到API接口，带上当前消息数量
            xhr.open('GET', '/api/messages?username=' + encodeURIComponent(username) + '&lastCount=' + currentMessageCount, true);
            
            // 设置超时（长轮询超时时间要大于服务器端的等待时间）
            xhr.timeout = 35000; // 35秒超时
            
            // 处理响应
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        // 解析JSON响应
                        const data = JSON.parse(xhr.responseText);
                        // 更新消息显示
                        updateMessages(data);
                    } catch (e) {
                        console.error('Error parsing JSON:', e);
                    }
                } else {
                    console.error('请求失败，状态码:', xhr.status);
                }
                
                // 无论成功失败，都继续下一次轮询
                longPollMessages();
            };
            
            // 处理错误
            xhr.onerror = function() {
                console.error('网络错误');
                // 错误后继续轮询
                longPollMessages();
            };
            
            // 处理超时
            xhr.ontimeout = function() {
                console.error('请求超时');
                // 超时后继续轮询
                longPollMessages();
            };
            
            // 发送请求
            xhr.send();
        }
        
        // 更新消息显示
        function updateMessages(data) {
            const messagesDiv = document.getElementById('messages');
            if (data && data.messages && data.messages.length > 0) {
                let messagesHtml = '';
                data.messages.forEach(function(msg) {
                    messagesHtml += '<div class="message-item"><span class="message-sender">' + msg.from + '</span>: <span class="message-content">' + msg.content + '</span></div>';
                });
                messagesDiv.innerHTML = messagesHtml;
                // 更新当前消息数量
                currentMessageCount = data.messages.length;
            } else {
                messagesDiv.innerHTML = '';
                currentMessageCount = 0;
            }
        }
        
        // 开始长轮询
        function startLongPolling() {
            // 立即执行一次
            longPollMessages();
        }
        
        // 页面加载完成后执行
        if (window.addEventListener) {
            window.addEventListener('load', startLongPolling);
        } else if (window.attachEvent) {
            window.attachEvent('onload', startLongPolling);
        } else {
            window.onload = startLongPolling;
        }
    </script>
</body>
</html>
